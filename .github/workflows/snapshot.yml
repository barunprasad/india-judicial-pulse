name: NJDG national snapshot

# Runs the snapshot pipeline on a schedule and commits any new time-series row.
# The national pipeline uses only Node built-ins (fetch/crypto/fs) — no npm install,
# no browser — so this job is fast and cheap. "Nothing manual."

on:
  schedule:
    - cron: '17 2 * * *'        # daily 02:17 UTC  (~07:47 IST)
  workflow_dispatch: {}          # allow manual run from the Actions tab

permissions:
  contents: write                # so the job can commit the new data row

concurrency:
  group: njdg-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fails the job (red) if NJDG changes shape or returns garbage — fail loudly,
      # never silently poison the history.
      - name: Capture NJDG national snapshot
        run: node src/snapshot.mjs

      - name: Commit new data (if any)
        run: |
          git config user.name  "njdg-snapshot-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/ data/latest.json
          if git diff --cached --quiet; then
            echo "No new data — figures unchanged since last run."
          else
            git commit -m "data: NJDG national snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            # Push to the branch that triggered the run (the default branch on a schedule);
            # HEAD:<branch> works even from a detached checkout. This push is what
            # re-triggers the Netlify build, so the live site refreshes itself.
            git push origin HEAD:${{ github.ref_name }}
          fi
